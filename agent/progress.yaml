notes:
  - Project is a shared library consumed by other agentbase projects
  - Uses Firebase Admin SDK (custom fork @prmichaelsen/firebase-admin-sdk-v8) and Firebase client SDK as peer deps
  - Exports via multiple entry points (services, lib, lib/auth, types, future: client)
  - ESM-only (type: module)
  - Pattern compliance at 65%, target 92% after M2-M4
  - M5 will add full client SDK for agentbase.me (~135 endpoints via OpenAPI)
  - M5 enables third-party OAuth integration with agentbase.me

