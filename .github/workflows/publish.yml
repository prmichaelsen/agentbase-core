name: Publish to npm

on:
  push:
    branches: [main]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Check if version changed
        id: version
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          PREVIOUS=$(git show HEAD~1:package.json 2>/dev/null | node -p "JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')).version" 2>/dev/null || echo "")
          if [ "$CURRENT" != "$PREVIOUS" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "version=$CURRENT" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish
        if: steps.version.outputs.changed == 'true'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Summary
        if: steps.version.outputs.changed == 'true'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          echo "::notice::Published @prmichaelsen/agentbase-core@${VERSION} to npm"
          echo "## Published to npm" >> "$GITHUB_STEP_SUMMARY"
          echo "**Package**: \`@prmichaelsen/agentbase-core@${VERSION}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "**Registry**: [npm](https://www.npmjs.com/package/@prmichaelsen/agentbase-core/v/${VERSION})" >> "$GITHUB_STEP_SUMMARY"

      - name: Skip
        if: steps.version.outputs.changed != 'true'
        run: |
          echo "::notice::Version unchanged, skipping publish"
          echo "## Publish skipped" >> "$GITHUB_STEP_SUMMARY"
          echo "Version unchanged from previous commit." >> "$GITHUB_STEP_SUMMARY"
